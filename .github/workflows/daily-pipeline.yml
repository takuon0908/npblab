name: Daily data pipeline

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - run: touch .env.local

      - name: Scrape npb.jp
        run: npm run scrape

      - name: Run championship/title simulations
        run: npm run simulate

      - name: Compute team analytics
        run: npm run analyze

      - name: Compute prospect rankings
        run: npm run prospects
